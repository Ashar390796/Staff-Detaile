<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }

    .nav-item {
      display: block;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #374151;
      opacity: 0.9;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      background: rgba(99, 102, 241, 0.12);
      color: #312e81;
      opacity: 1;
    }

    .nav-item.active {
      background: #eef2ff;
      color: #4338ca;
      font-weight: 600;
    }

    .th,
    .th-center {
      padding: 1rem;
      font-weight: 600;
      border-right: 1px solid #e5e7eb;
    }

    .th-center {
      text-align: center;
    }

    .sub-th {
      padding: 0.75rem;
      text-align: center;
      font-weight: 500;
      border-right: 1px solid #e5e7eb;
    }

    .td,
    .td-center {
      padding: 0.75rem;
      border-right: 1px solid #e5e7eb;
    }

    .td-center {
      text-align: center;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen text-gray-900">

  <div class="flex min-h-screen">


    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 shadow-lg">
      <div class="px-6 py-5 text-2xl font-bold text-indigo-600">
        <a href="home.html"> Dashboard</a>
      </div>

      <nav class="px-3 space-y-1">
        <a href="schedule.html" class="nav-item">
          <span class="mr-3">🏠</span> My Schedule
        </a>

        <a href="payroll.html" class="nav-item">
          <span class="mr-3">💰</span> My Payroll
        </a>

        <a href="Comission.html" class="nav-item">
          <span class="mr-3">📈</span> My Commission
        </a>

        <a href="Deduction.html" class="nav-item">
          <span class="mr-3">📌</span> My Deduction
        </a>

        <a href="Stores.html" class="nav-item">
          <span class="mr-3">🏬</span> My Stores
        </a>

        <a href="DM.html" class="nav-item ">
          <span class="mr-3">🧑‍💼</span> Today’s Schedule
        </a>
        <!-- drop down rma -->
        <div class="relative group">
          <a href="#"
            class="nav-item flex items-center justify-between px-4 py-2 hover:bg-slate-100 rounded-lg transition-all w-full">
            <div class="flex items-center">
              <span class="mr-3">📦</span> <span>RMA</span>
            </div>
            <svg class="w-4 h-4 transition-transform group-hover:rotate-180 text-gray-500" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </a>

          <div
            class="absolute left-0 mt-1 w-48 bg-white border border-slate-200 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
            <div class="py-2">
              <a href="newRma.html"
                class="flex items-center px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <span class="mr-3">➕</span> Submit New RMA
              </a>
              <hr class="border-slate-100 my-1">
              <a href="Rma.html"
                class="flex items-center px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <span class="mr-3">📋</span> All RMAs
              </a>
            </div>
          </div>
        </div>
        <a href="profile.html" class="nav-item active">
          <span class="mr-3">👤</span> Edit Profile
        </a>

        <a href="Login.html" class="nav-item text-red-500">
          <span class="mr-3">🚪</span> Log out
        </a>
      </nav>
    </aside>



    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-10">

      <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="mb-8">
          <h1 class="text-3xl font-bold">Edit Profile</h1>
          <p class="text-gray-500 mt-1">Manage your personal information</p>
        </div>

        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

          <!-- Avatar -->
          <div class="flex items-center gap-6 mb-8">
            <div
              class="w-20 h-20 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-2xl font-bold">
              A
            </div>
            <div>
              <h2 class="text-lg font-semibold">Ashar Ali</h2>
              <p class="text-gray-500 text-sm">ashar@example.com</p>
            </div>
          </div>

          <!-- Form -->
          <form class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium mb-1">First Name</label>
                <input type="text"
                  class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
              </div>

              <div>
                <label class="block text-sm font-medium mb-1">Last Name</label>
                <input type="text"
                  class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium mb-1">Email</label>
              <input type="email"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
              <label class="block text-sm font-medium mb-1">Username</label>
              <input type="text"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
              <label class="block text-sm font-medium mb-1">Password</label>
              <input type="password" placeholder="Leave blank to keep current password"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">

            </div>

            <div class="pt-4 flex justify-end">
              <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium transition">
                Save Changes
              </button>
            </div>

          </form>

        </div>

      </div>

    </main>
  </div>

</body>

</html>

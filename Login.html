<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .glass-card {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
</style>

<div class="min-h-screen bg-[#F0F4F8] flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-200/40 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-200/40 rounded-full blur-[120px]"></div>

  <div class="w-full max-w-[440px] z-10">
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-indigo-600 rounded-[22px] flex items-center justify-center text-white text-3xl font-extrabold shadow-xl shadow-indigo-200 mb-4 transition-transform hover:rotate-6">
        D
      </div>
      <h1 class="text-3xl font-[800] text-slate-900 tracking-tight">Welcome Back</h1>
      <p class="text-slate-500 font-medium mt-1">Please enter your details to sign in</p>
    </div>

    <div class="glass-card bg-white/70 border border-white rounded-[32px] shadow-2xl shadow-slate-200/60 p-10">
      <form class="space-y-6">
        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-700 ml-1">Email Address</label>
          <div class="relative group">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 transition-colors">✉️</span>
            <input type="email" placeholder="you@example.com" 
              class="w-full pl-11 pr-5 py-4 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-600 transition-all placeholder:text-slate-400 font-medium" />
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center ml-1">
            <label class="text-sm font-bold text-slate-700">Password</label>
            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">Forgot?</a>
          </div>
          <div class="relative group">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 transition-colors">🔒</span>
            <input type="password" placeholder="••••••••" 
              class="w-full pl-11 pr-12 py-4 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-600 transition-all placeholder:text-slate-400" />
            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-xs font-bold uppercase tracking-tighter">Show</button>
          </div>
        </div>

        <label class="flex items-center gap-3 cursor-pointer group">
          <div class="relative">
            <input type="checkbox" class="peer sr-only" />
            <div class="w-5 h-5 bg-white border-2 border-slate-200 rounded-md peer-checked:bg-indigo-600 peer-checked:border-indigo-600 transition-all flex items-center justify-center">
              <span class="text-white text-[10px] scale-0 peer-checked:scale-100 transition-transform">✓</span>
            </div>
          </div>
          <span class="text-sm font-semibold text-slate-600 select-none">Stay signed in for 30 days</span>
        </label>

        <button type="submit" 
          class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:shadow-indigo-200 hover:-translate-y-0.5 transition-all active:scale-[0.98]">
          <a href="index.html">Sign in to Dashboard</a>
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-slate-500 font-medium">
          New here? <a href="sign up.html" class="text-indigo-600 font-bold hover:underline">Create an account</a>
        </p>
      </div>
    </div>
    
    <p class="text-center mt-8 text-xs text-slate-400 font-medium hover:text-slate-600 transition-colors cursor-pointer">
      Having trouble? Contact Support
    </p>
  </div>
</div>
</body>
</html>
